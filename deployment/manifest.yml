# IBM Cloud Foundry Manifest
# Deploy with: cf push

applications:
- name: carbon-pr-review
  memory: 512M
  disk_quota: 1G
  instances: 1
  buildpack: nodejs_buildpack
  command: node src/index.js
  
  # Environment variables
  env:
    NODE_ENV: production
    TMPDIR: /tmp/pr-reviews
  
  # Services (create with: cf cups carbon-pr-review-secrets -p '{"GITHUB_AI_AGENT_TOKEN":"xxx",...}')
  services:
    - carbon-pr-review-secrets
  
  # Health check
  health-check-type: process
  timeout: 180
  
  # Routing (optional - if you want HTTP endpoint)
  no-route: true
  
  # Stack
  stack: cflinuxfs4

